name: Update psychiatry events (PL, online/offline)

on:
  schedule:
    # 1st day of month at 06:15 UTC (~07:15 Warsaw winter / ~08:15 summer)
    - cron: "15 6 1 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run updater
        id: updater
        run: |
          set +e
          python scripts/update.py
          code=$?
          echo "exit_code=$code" >> $GITHUB_OUTPUT
          exit 0

      - name: Detect event changes
        id: diff
        run: |
          if [ "${{ steps.updater.outputs.exit_code }}" = "2" ]; then
            echo "changed=1" >> $GITHUB_OUTPUT
          else
            echo "changed=0" >> $GITHUB_OUTPUT
          fi

      - name: Commit event changes
        if: steps.diff.outputs.changed == '1'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/changes.md docs/psychiatria.ics docs/events.html
          git commit -m "Update events calendar"
          git push

      - name: Create issue with change log
        if: steps.diff.outputs.changed == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('data/changes.md', 'utf8');
            const title = 'Aktualizacja wydarzeń – ' + new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });

      - name: Keepalive (commit when no event changes)
        if: steps.diff.outputs.changed == '0'
        run: |
          echo "keepalive: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > docs/keepalive.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/keepalive.txt
          git commit -m "Keepalive" || exit 0
          git push
